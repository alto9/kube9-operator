apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube9-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube9-operator.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "kube9-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kube9-operator.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kube9-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: operator
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: LOG_LEVEL
          value: {{ .Values.logLevel | quote }}
        - name: STATUS_UPDATE_INTERVAL_SECONDS
          value: {{ .Values.statusUpdateIntervalSeconds | quote }}
        - name: CLUSTER_METADATA_INTERVAL_SECONDS
          value: {{ .Values.metrics.intervals.clusterMetadata | default 86400 | quote }}
        - name: RESOURCE_INVENTORY_INTERVAL_SECONDS
          value: {{ .Values.metrics.intervals.resourceInventory | default 21600 | quote }}
        - name: RESOURCE_CONFIGURATION_PATTERNS_INTERVAL_SECONDS
          value: {{ .Values.metrics.intervals.resourceConfigurationPatterns | default 43200 | quote }}
        # ArgoCD configuration
        - name: ARGOCD_AUTO_DETECT
          value: {{ .Values.argocd.autoDetect | quote }}
        {{- if .Values.argocd.enabled }}
        - name: ARGOCD_ENABLED
          value: {{ .Values.argocd.enabled | quote }}
        {{- end }}
        {{- if .Values.argocd.namespace }}
        - name: ARGOCD_NAMESPACE
          value: {{ .Values.argocd.namespace | quote }}
        {{- end }}
        {{- if .Values.argocd.selector }}
        - name: ARGOCD_SELECTOR
          value: {{ .Values.argocd.selector | quote }}
        {{- end }}
        - name: ARGOCD_DETECTION_INTERVAL
          value: {{ .Values.argocd.detectionInterval | default 6 | quote }}
        {{- $argapi := .Values.argocd.api | default dict }}
        - name: ARGOCD_API_COLLECTION_ENABLED
          value: {{ $argapi.collectionEnabled | default true | quote }}
        {{- if $argapi.baseUrl }}
        - name: ARGOCD_API_BASE_URL
          value: {{ $argapi.baseUrl | quote }}
        {{- end }}
        - name: ARGOCD_API_TIMEOUT_MS
          value: {{ $argapi.timeoutMs | default 30000 | quote }}
        - name: ARGOCD_API_TLS_INSECURE
          value: {{ $argapi.tlsInsecure | default false | quote }}
        - name: ARGOCD_API_SERVER_SERVICE_NAME
          value: {{ $argapi.serverServiceName | default "argocd-server" | quote }}
        {{- if $argapi.tokenFile }}
        - name: ARGOCD_API_TOKEN_FILE
          value: {{ $argapi.tokenFile | quote }}
        {{- end }}
        - name: ARGOCD_APPLICATION_STATUS_INTERVAL_SECONDS
          value: {{ .Values.metrics.intervals.argocdApplicationStatus | default 3600 | quote }}
        # Optional Trivy server detection
        - name: TRIVY_AUTO_DETECT
          value: {{ .Values.trivy.autoDetect | quote }}
        {{- if kindIs "bool" .Values.trivy.enabled }}
        - name: TRIVY_ENABLED
          value: {{ .Values.trivy.enabled | quote }}
        {{- end }}
        {{- if .Values.trivy.serverUrl }}
        - name: TRIVY_SERVER_URL
          value: {{ .Values.trivy.serverUrl | quote }}
        {{- end }}
        - name: TRIVY_HEALTH_PATH
          value: {{ .Values.trivy.healthPath | default "/healthz" | quote }}
        - name: TRIVY_DETECTION_INTERVAL
          value: {{ .Values.trivy.detectionInterval | default 6 | quote }}
        - name: TRIVY_DETECTION_TIMEOUT_MS
          value: {{ .Values.trivy.detectionTimeoutMs | default 10000 | quote }}
        - name: TRIVY_MAX_SCANS_PER_CYCLE
          value: {{ .Values.trivy.maxScansPerCycle | default 100 | quote }}
        - name: TRIVY_SCAN_TIMEOUT_MS
          value: {{ .Values.trivy.scanTimeoutMs | default 600000 | quote }}
        # Use .Values.trivy.vulnMax* without | default so 0 is preserved (Sprig default treats 0 as empty)
        - name: VULN_MAX_CRITICAL
          value: {{ .Values.trivy.vulnMaxCritical | quote }}
        - name: VULN_MAX_HIGH
          value: {{ .Values.trivy.vulnMaxHigh | quote }}
        - name: VULN_MAX_MEDIUM
          value: {{ .Values.trivy.vulnMaxMedium | quote }}
        - name: WORKLOAD_IMAGE_SCAN_INTERVAL_SECONDS
          value: {{ .Values.metrics.intervals.workloadImageScan | default 86400 | quote }}
        # Periodic assessment schedule (see assessment.* in values.yaml)
        {{- $assessment := .Values.assessment | default dict }}
        - name: ASSESSMENT_ENABLED
          value: {{ $assessment.enabled | default true | quote }}
        - name: ASSESSMENT_INTERVAL_SECONDS
          value: {{ $assessment.intervalSeconds | default 86400 | quote }}
        - name: ASSESSMENT_MODE
          value: {{ $assessment.mode | default "full" | quote }}
        {{- if $assessment.timeoutSeconds }}
        - name: ASSESSMENT_TIMEOUT_SECONDS
          value: {{ $assessment.timeoutSeconds | quote }}
        {{- end }}
        # Periodic AI conformance schedule (see aiConformance.* in values.yaml)
        {{- $aiConformance := .Values.aiConformance | default dict }}
        - name: AI_CONFORMANCE_ENABLED
          value: {{ $aiConformance.enabled | default true | quote }}
        - name: AI_CONFORMANCE_INTERVAL_SECONDS
          value: {{ $aiConformance.intervalSeconds | default 86400 | quote }}
        - name: AI_CONFORMANCE_CHECKLIST_SOURCE
          value: {{ $aiConformance.checklistSource | default "bundled" | quote }}
        # Event retention configuration
        - name: EVENT_RETENTION_INFO_WARNING_DAYS
          value: {{ .Values.events.retention.infoWarning | default 7 | quote }}
        - name: EVENT_RETENTION_ERROR_CRITICAL_DAYS
          value: {{ .Values.events.retention.errorCritical | default 30 | quote }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        {{- if .Values.events.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "kube9-operator.fullname" . }}-events-data
        {{- else }}
        emptyDir: {}
        {{- end }}

