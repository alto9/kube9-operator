{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube9-operator.fullname" . }}
  labels:
    {{- include "kube9-operator.labels" . | nindent 4 }}
rules:
# Read cluster version (for cluster metadata collection)
- verbs: ["get"]
  nonResourceURLs: ["/version"]
# Read cluster metadata and resources (for data collection: cluster metadata and resource inventory)
- apiGroups: [""]
  resources: ["nodes", "namespaces", "pods", "configmaps"]
  verbs: ["get", "list", "watch"]
# Read Kubernetes events (for event monitoring and recording)
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]
# Read workloads and services (for inventory + assessment checks)
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]
# Read autoscaling and disruption resources (assessment checks)
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["get", "list", "watch"]
# Read NetworkPolicies (ai-conformance security.network-policy-default-deny)
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch"]
# Read namespace governance resources (assessment checks)
- apiGroups: [""]
  resources: ["resourcequotas", "limitranges"]
  verbs: ["get", "list", "watch"]
# ArgoCD detection permissions (check for CRDs, namespaces, and deployments)
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"]
# Read optional autoscaling custom resources when present (VPA checks)
- apiGroups: ["autoscaling.k8s.io"]
  resources: ["verticalpodautoscalers"]
  verbs: ["get", "list", "watch"]
# RBAC policy analysis (assessment checks)
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles", "roles", "clusterrolebindings", "rolebindings"]
  verbs: ["get", "list"]
{{- end }}

