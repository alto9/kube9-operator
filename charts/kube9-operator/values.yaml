# Operator image configuration
image:
  repository: ghcr.io/alto9/kube9-operator
  tag: "2.4.0"
  pullPolicy: IfNotPresent

# Operator resource requests and limits
# Using Guaranteed QoS (requests = limits) for stable performance
# 1Gi needed to handle CLI exec spawning separate Node.js processes
resources:
  requests:
    memory: "1Gi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# Service account configuration
serviceAccount:
  create: true
  name: "kube9-operator"

# Optional annotations on the operator pod (e.g. prometheus.io/scrape for metrics discovery)
podAnnotations: {}

# RBAC configuration
rbac:
  create: true

# Log level (debug, info, warn, error)
logLevel: "info"

# Status update interval in seconds
statusUpdateIntervalSeconds: 60

# Paid kube9 experiences ship in kube9-desktop; this chart does not bundle API keys or registration.

# ArgoCD integration configuration
argocd:
  # Enable automatic ArgoCD detection (default: true)
  autoDetect: true
  
  # Explicitly enable or disable ArgoCD integration (optional)
  # enabled: true
  
  # Custom namespace where ArgoCD is installed (default: "argocd")
  # namespace: "argocd"
  
  # Custom label selector for ArgoCD server deployment (optional)
  # selector: "app.kubernetes.io/name=argocd-server"
  
  # Detection check interval in hours (default: 6)
  detectionInterval: 6

  # Argo CD REST API (Application sync/health collection; in-cluster, no ingress)
  api:
    # When false, the operator does not schedule Application status pulls
    collectionEnabled: true
    # Explicit API base URL, e.g. https://argocd-server.argocd.svc.cluster.local (optional)
    baseUrl: ""
    timeoutMs: 30000
    # Only for labs / mis-signed certs — prefer proper CA trust in production
    tlsInsecure: false
    # Kubernetes Service name segment for derived URL when baseUrl is empty and Argo CD is detected
    serverServiceName: argocd-server
    # Dedicated Argo CD API bearer token (M17 resource-tree). Platform admin creates the Secret out-of-band.
    token:
      # Name of an existing Secret in the release namespace. Empty/unset = no mount (default-off).
      existingSecret: ""
      # Key within that Secret holding the bearer token string.
      existingSecretKey: token
    # Advanced: override ARGOCD_API_TOKEN_FILE path without chart-managed Secret mount.
    # tokenFile: ""

# Optional Trivy server detection (does not install Trivy; set serverUrl to probe)
trivy:
  autoDetect: true
  # serverUrl: "http://trivy.trivy-system.svc.cluster.local:4954"
  healthPath: "/healthz"
  detectionInterval: 6
  detectionTimeoutMs: 10000
  # Per-image scan timeout for the Trivy CLI (maps to TRIVY_SCAN_TIMEOUT_MS; default 600000 ms)
  scanTimeoutMs: 600000
  # Cap on Trivy image scans per workload-image cycle (sorted unique image refs; not full cluster in one cycle)
  maxScansPerCycle: 100
  # Stored vulnerability assessment (maps to VULN_MAX_*). Default critical=0 fails on any critical finding.
  vulnMaxCritical: 0
  vulnMaxHigh: 1000000
  vulnMaxMedium: 1000000

# Collection interval configuration (for testing/debugging)
# The operator enforces minimum intervals to prevent abuse
metrics:
  intervals:
    # Cluster metadata collection interval in seconds (default: 86400 = 24 hours)
    # Minimum: 3600 seconds (1 hour)
    clusterMetadata: 86400
    # Resource inventory collection interval in seconds (default: 21600 = 6 hours)
    # Minimum: 1800 seconds (30 minutes)
    resourceInventory: 21600
    # Resource configuration patterns collection interval in seconds (default: 43200 = 12 hours)
    # Minimum: 3600 seconds (1 hour)
    resourceConfigurationPatterns: 43200
    # Workload image collection + optional Trivy scan cycle (default: 86400 = 24 hours)
    # Minimum: 3600 seconds (1 hour)
    workloadImageScan: 86400
    # Argo CD Application API collection (default 3600 = 1h, minimum 1800 = 30m)
    argocdApplicationStatus: 3600

# Periodic Well-Architected assessment scheduling (operator reads these at startup)
assessment:
  enabled: true
  # Interval between scheduled runs when enabled (seconds). Minimum: 3600
  intervalSeconds: 86400
  # Default mode for scheduled runs: full | pillar | single-check
  mode: full
  # Optional per-run timeout in seconds (omit to use runner defaults)
  # timeoutSeconds: 3600

# Periodic Kubernetes AI Conformance readiness evaluation (bundled checklist data)
aiConformance:
  enabled: true
  # Interval between scheduled runs when enabled (seconds). Minimum: 3600
  intervalSeconds: 86400
  # Checklist source packaged with the operator image (only bundled is supported today)
  checklistSource: bundled

# Event storage configuration
events:
  # PersistentVolume configuration for event database
  persistence:
    enabled: true  # Default: enabled
    size: 5Gi
    storageClassName: ""  # Uses cluster default if not specified
    accessMode: ReadWriteOnce
    
  # Event retention policies (in days)
  retention:
    infoWarning: 7  # Info and warning events retained for 7 days
    errorCritical: 30  # Error and critical events retained for 30 days

