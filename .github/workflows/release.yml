name: Release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          # IMPORTANT: disable persist-credentials to avoid using the default GITHUB_TOKEN
          persist-credentials: false

      # Step to generate an installation token from the GitHub App
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: alto9
          repositories: |
            kube9-operator

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run semantic-release
        id: semantic-release
        env:
          # Use the token generated by the previous step
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: npx semantic-release

      - name: Fetch latest GitHub release for Slack
        if: always() && hashFiles('.semantic-release-success') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/releases/latest" \
            --jq '{tag_name: .tag_name, body: (.body // ""), html_url: .html_url}' > release-meta.json

      - name: Build Slack payload
        if: always() && hashFiles('.semantic-release-success') != ''
        run: |
          jq -n --arg repo "${{ github.event.repository.name }}" --slurpfile meta release-meta.json '
            ($meta[0]) as $m |
            (($m.body) | if length > 2800 then .[0:2800] + "\n\n_…truncated_" else . end) as $bodySafe |
            {
              channel: "#alto9-tech-team",
              text: ($repo + " " + $m.tag_name + " released"),
              blocks: [
                {
                  type: "header",
                  text: {type: "plain_text", text: ($repo + " " + $m.tag_name), emoji: true}
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: (if ($bodySafe | length) > 0 then $bodySafe else "_No release notes provided._" end)
                  }
                },
                {
                  type: "context",
                  elements: [
                    {type: "mrkdwn", text: ("<" + $m.html_url + "|View release on GitHub>")}
                  ]
                }
              ]
            }
          ' > slack-payload.json

      - name: Post release to Slack
        if: always() && hashFiles('.semantic-release-success') != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload-file-path: slack-payload.json
