# Manual release: semantic-release on the default branch, then push image to GHCR and chart to charts.kube9.io.
# No staging environment for this repo. Fails if semantic-release creates no new tag.
name: Cut Release

on:
  workflow_dispatch:

concurrency:
  group: cut-release-operator
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_VERSION: '3.12.0'
  AWS_REGION: 'us-east-1'

jobs:
  release:
    name: Version and tag (semantic-release)
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: alto9
          repositories: |
            kube9-operator

      - name: Capture existing tags (before semantic-release)
        run: |
          git fetch --tags origin
          git tag -l | sort -u > tags-before.txt

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run semantic-release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: npx semantic-release

      - name: Sync branch and tags after release
        run: |
          git fetch origin "${{ github.event.repository.default_branch }}" --tags
          git checkout "${{ github.event.repository.default_branch }}"
          git pull --ff-only "origin/${{ github.event.repository.default_branch }}" || true

      - name: Detect newly created version tag
        id: meta
        run: |
          set -euo pipefail
          git fetch --tags origin
          sort -u tags-before.txt > tags-before-sorted.txt
          git tag -l | sort -u > tags-after.txt
          NEW_TAG=$(comm -13 tags-before-sorted.txt tags-after.txt | head -n1 || true)
          if [[ -z "${NEW_TAG}" ]]; then
            echo "::error::semantic-release did not create a new tag. Nothing to publish."
            exit 1
          fi
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "New tag: ${NEW_TAG}"

  publish_image:
    name: Publish Docker image
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.release.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.release.outputs.tag }},enable=true
          labels: |
            org.opencontainers.image.title=kube9-operator
            org.opencontainers.image.description=Kubernetes Operator for kube9 Ecosystem
            org.opencontainers.image.vendor=Alto9
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md

      - name: Record source revision
        id: src
        run: echo "rev=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VCS_REF=${{ steps.src.outputs.rev }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        if: success()
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: success() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  publish_chart:
    name: Publish Helm chart
    needs: release
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.release.outputs.tag }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get bucket name from stack
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name kube9-operator-charts \
            --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' \
            --output text)
          echo "BUCKET_NAME=$BUCKET_NAME" >> $GITHUB_ENV

      - name: Package Helm chart
        run: |
          rm -f kube9-operator-*.tgz
          helm package charts/kube9-operator
          CHART_FILE=$(ls kube9-operator-*.tgz | head -1)
          echo "CHART_FILE=${CHART_FILE}" >> $GITHUB_ENV
          CHART_VERSION=$(echo "${CHART_FILE}" | sed 's/kube9-operator-\(.*\)\.tgz/\1/')
          echo "CHART_VERSION=${CHART_VERSION}" >> $GITHUB_ENV
          echo "Packaged chart: ${CHART_FILE} (version: ${CHART_VERSION})"

      - name: Download existing index.yaml
        run: |
          aws s3 cp s3://${{ env.BUCKET_NAME }}/index.yaml index.yaml || cat > index.yaml <<EOF
          apiVersion: v1
          entries: {}
          EOF

      - name: Update index.yaml
        run: |
          helm repo index . \
            --url https://charts.kube9.io \
            --merge index.yaml

      - name: Upload chart package to S3
        run: |
          aws s3 cp ${{ env.CHART_FILE }} s3://${{ env.BUCKET_NAME }}/ \
            --content-type application/gzip \
            --cache-control "public, max-age=31536000, immutable" \
            --metadata-directive REPLACE

      - name: Upload index.yaml to S3
        run: |
          aws s3 cp index.yaml s3://${{ env.BUCKET_NAME }}/ \
            --content-type text/yaml \
            --cache-control "public, max-age=300" \
            --metadata-directive REPLACE

      - name: Get CloudFront distribution ID
        run: |
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name kube9-operator-charts \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text)
          echo "DISTRIBUTION_ID=$DISTRIBUTION_ID" >> $GITHUB_ENV

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Chart publish summary
        run: |
          echo "Chart published: ${{ env.CHART_FILE }} version ${{ env.CHART_VERSION }}"
