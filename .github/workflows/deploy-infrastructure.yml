# Deploy charts.kube9.io CDK stack after **CI** succeeds on a push to main (when this repo’s
# infrastructure paths change), or on manual **workflow_dispatch**. CloudFormation stack id:
# `kube9-operator-charts` (CDK construct remains `ChartsStack`).
name: Deploy Chart Repository Infrastructure

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]

env:
  NODE_VERSION: '22.x'
  AWS_REGION: 'us-east-1'

jobs:
  decide:
    name: Decide if CDK deploy is needed
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       (github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'master'))
    outputs:
      deploy: ${{ steps.pick.outputs.deploy }}
      checkout_sha: ${{ steps.pick.outputs.checkout_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Path filter / manual dispatch
        id: pick
        run: |
          set -euo pipefail
          COMMIT="$(git rev-parse HEAD)"
          echo "checkout_sha=${COMMIT}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          while IFS= read -r f; do
            [[ -z "${f}" ]] && continue
            if [[ "${f}" == infrastructure/* ]] || [[ "${f}" == .github/workflows/deploy-infrastructure.yml ]]; then
              echo "deploy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done < <(git show --pretty=format: --name-only "${COMMIT}")
          echo "deploy=false" >> "$GITHUB_OUTPUT"
          echo "No infrastructure-related files in ${COMMIT}; skipping CDK deploy."

  deploy-infrastructure:
    name: Deploy CDK (charts hosting)
    needs: decide
    if: needs.decide.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.checkout_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'infrastructure/package-lock.json'

      - name: Install infrastructure dependencies
        working-directory: ./infrastructure
        run: npm ci

      - name: Build infrastructure
        working-directory: ./infrastructure
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap CDK
        working-directory: ./infrastructure
        run: |
          npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }} || true
        continue-on-error: true

      - name: Synthesize CDK stack
        working-directory: ./infrastructure
        run: npx cdk synth
        env:
          CHARTS_CERTIFICATE_ARN: ${{ secrets.CHARTS_CERTIFICATE_ARN }}
          CHARTS_HOSTED_ZONE_ID: ${{ secrets.CHARTS_HOSTED_ZONE_ID }}

      - name: Deploy CDK stack
        working-directory: ./infrastructure
        run: npx cdk deploy --require-approval never
        env:
          CHARTS_CERTIFICATE_ARN: ${{ secrets.CHARTS_CERTIFICATE_ARN }}
          CHARTS_HOSTED_ZONE_ID: ${{ secrets.CHARTS_HOSTED_ZONE_ID }}

      - name: Get stack outputs
        working-directory: ./infrastructure
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name kube9-operator-charts \
            --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' \
            --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name kube9-operator-charts \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text)
          echo "BUCKET_NAME=$BUCKET_NAME" >> $GITHUB_ENV
          echo "DISTRIBUTION_ID=$DISTRIBUTION_ID" >> $GITHUB_ENV

      - name: Output deployment info
        run: |
          echo "✅ Infrastructure deployed successfully"
          echo "Bucket: ${{ env.BUCKET_NAME }}"
          echo "Distribution: ${{ env.DISTRIBUTION_ID }}"
          echo "Repository URL: https://charts.kube9.io"
